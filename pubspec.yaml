name: smart_farm_app_flutter
description: Smart Farm Flutter App

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.12.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1

  # Networking
  dio: ^5.6.0

  # Routing / navigation
  go_router: ^14.2.7

  # Local storage
  shared_preferences: ^2.3.2

  # Date/time formatting
  intl: ^0.19.0
  firebase_core: ^3.6.0
  firebase_database: ^11.1.4
  firebase_messaging: ^15.1.3
  firebase_auth: ^5.3.1

# Bluetooth provisioning
  flutter_blue_plus: ^1.34.5
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: 5.0.0
